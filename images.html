<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Images | Kevin Deon Norton</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <style>  
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }  
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 2rem; }  
        .gallery-item { position: relative; overflow: hidden; border: 1px solid #333; transition: transform 0.3s ease; }  
        .gallery-item:hover { transform: scale(1.02); border-color: #fff; }  
        .gallery-item img { width: 100%; height: 400px; object-fit: cover; filter: grayscale(100%); transition: filter 0.3s ease; }  
        .gallery-item:hover img { filter: grayscale(0%); }  
        .caption { padding: 1rem; background: #000; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }  
    </style>  
</head>  
<body>

    <!-- Simple Nav -->  
    <nav class="p-8 flex justify-between items-center border-b border-zinc-800">  
        <a href="index.html" class="text-xl font-bold tracking-tighter">KEVIN DEON NORTON</a>  
        <div class="space-x-6 text-sm uppercase tracking-widest">  
            <a href="index.html" class="hover:text-zinc-400">Home</a>  
            <a href="about.html" class="hover:text-zinc-400">About</a>  
            <a href="images.html" class="text-white border-b border-white">Images</a>  
        </div>  
    </nav>

    <header class="py-16 text-center">  
        <h1 class="text-5xl font-black uppercase tracking-tighter">The Visuals</h1>  
        <p class="mt-4 text-zinc-500 uppercase tracking-widest text-xs">A glimpse into the pillars: BQC, Film, and Music.</p>  
    </header>

    <div class="gallery-grid">  
        <!-- Item 1: Book Cover -->  
        <div class="gallery-item">  
            <img src="https://cdn.marblism.com/v3mv1eQT8nP.webp" alt="Unfamiliar Threshold">  
            <div class="caption">Unfamiliar Threshold: Leadership Framework</div>  
        </div>

        <!-- Item 2: Profile -->  
        <div class="gallery-item">  
            <img src="https://cdn.marblism.com/V9WvMN-IGUp.png" alt="Kevin Deon Norton">  
            <div class="caption">Kevin Deon Norton | The Founder</div>  
        </div>

        <!-- Item 3: Film Placeholder (Replace 'kevin-film.jpg' with your actual filename) -->  
        <div class="gallery-item">  
            <img src="kevin-film.jpg" alt="Film Set">  
            <div class="caption">Directing: The Zika Project</div>  
        </div>

        <!-- Item 4: Music/Live Performance -->  
        <div class="gallery-item">  
            <img src="tulsa-flood.jpg" alt="Tulsa Flood Music">  
            <div class="caption">On Stage: Tulsa Flood History</div>  
        </div>  
    </div>

    <footer class="py-20 text-center border-t border-zinc-900">  
        <p class="text-zinc-600 text-xs tracking-widest uppercase">&copy; 2026 BRUBAKER QUALITY CONTROL</p>  
    </footer>

</body>  
</html>
